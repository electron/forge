name: CI

on:
  push:
    branches:
      - main
      - next
    tags:
      - v[0-9]+.[0-9]+.[0-9]+*
  pull_request:
  merge_group:
    types: [checks_requested]
  workflow_call:

jobs:
  lint-and-build:
    runs-on: ubuntu-22.04
    steps:
      - name: Configure git
        run: git config --global core.autocrlf input

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Electron Forge
        run: yarn build

      - name: Lint codebase
        run: |
          yarn lint
          yarn constraints
          yarn knip

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist-files
          path: packages/*/*/dist/*

  fast-tests:
    needs: lint-and-build
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-latest]
        arch: [x64, arm64]
        exclude:
          - os: windows-latest
            arch: arm64
          - os: ubuntu-22.04
            arch: arm64
          - os: macos-latest
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Configure git
        run: git config --global core.autocrlf input

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc

      - name: Use D:\\ drive for Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p /d/fast-temp
          echo "YARN_GLOBAL_FOLDER=D:\\yarn-data" >> $GITHUB_ENV
          echo "TEMP=D:\\fast-temp" >> $GITHUB_ENV

      - name: Install dependencies
        run: yarn install --immutable

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-files
          path: packages

      - name: Windows setup
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd "$PROGRAMFILES/nodejs/node_modules/npm/node_modules/@npmcli/run-script"
          npm install node-gyp@9.4.0

      - name: Linux setup
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            --no-install-recommends \
            xvfb \
            libnss3 \
            libasound2 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libgdk-pixbuf2.0-dev \
            libgtk-3-0 \
            libgbm1
          sudo add-apt-repository -y ppa:alexlarsson/flatpak

      - name: Install pnpm
        run: npm install -g pnpm@10.0.0

      - name: Run fast tests
        run: |
          mkdir -p ./reports/out
          yarn test:fast --reporter=default --reporter=junit --outputFile="./reports/out/test_output.xml"

  slow-tests:
    needs: lint-and-build
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-latest]
        arch: [x64, arm64]
        exclude:
          - os: windows-latest
            arch: arm64
          - os: ubuntu-22.04
            arch: arm64
          - os: macos-latest
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Configure git
        run: git config --global core.autocrlf input

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc

      - name: Use D:\\ drive for Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p /d/fast-temp
          echo "YARN_GLOBAL_FOLDER=D:\\yarn-data" >> $GITHUB_ENV
          echo "TEMP=D:\\fast-temp" >> $GITHUB_ENV

      - name: Install dependencies
        run: yarn install --immutable

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-files
          path: packages

      - name: Windows setup
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd "$PROGRAMFILES/nodejs/node_modules/npm/node_modules/@npmcli/run-script"
          npm install node-gyp@9.4.0

      - name: Linux setup
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            --no-install-recommends \
            xvfb \
            libnss3 \
            libasound2 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libgdk-pixbuf2.0-dev \
            libgtk-3-0 \
            libgbm1
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Install pnpm
        run: npm install -g pnpm@10.0.0

      - name: Run slow tests
        run: |
          mkdir -p ./reports/out
          yarn test:slow --reporter=default --reporter=junit --outputFile="./reports/out/test_output.xml"
          yarn test:verdaccio --reporter=default --reporter=junit --outputFile="./reports/out/test_output_verdaccio.xml"

  required-ci:
    needs:
      - lint-and-build
      - fast-tests
      - slow-tests
    runs-on: ubuntu-latest
    steps:
      - name: We are done
        run: echo "Hello World"
