name: CI

on:
  push:
    branches:
      - main
    tags: # zizmor: ignore[cache-poisoning] this isn't used in a release workflow
      - v[0-9]+.[0-9]+.[0-9]+*
  pull_request:
  merge_group:
    types: [checks_requested]

permissions: {}

env:
  NODE_VERSION: 20.17.0

jobs:
  lint-and-build:
    runs-on: ubuntu-22.04
    steps:
      - name: Configure git
        run: git config --global core.autocrlf input

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # TODO(Forge 8): remove this once we can upgrade to `@electron/rebuild` v4
      - name: Set up Python 3.11 (with distutils)
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.11

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Electron Forge
        run: yarn build

      - name: Cache ESLint
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: .eslintcache
          key: v2-lint-dependencies-${{ hashFiles('yarn.lock') }}-${{ hashFiles('.eslintrc.json') }}

      - name: Lint codebase
        run: |
          yarn lint
          yarn constraints

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist-files
          path: packages/*/*/dist/*

  fast-tests:
    needs: lint-and-build
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-latest]
        arch: [x64, arm64]
        exclude:
          - os: windows-latest
            arch: arm64
          - os: ubuntu-22.04
            arch: arm64
          - os: macos-latest
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Configure git
        run: git config --global core.autocrlf input

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # TODO(Forge 8): remove this once we can upgrade to `@electron/rebuild` v4
      - name: Set up Python 3.11 (with distutils)
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.11

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: yarn install --immutable

      - name: Download build artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: dist-files
          path: packages

      - name: Windows setup
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd "$PROGRAMFILES/nodejs/node_modules/npm/node_modules/@npmcli/run-script"
          npm install node-gyp@9.4.0

      - name: Linux setup
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            --no-install-recommends \
            xvfb \
            libnss3 \
            libasound2 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libgdk-pixbuf2.0-dev \
            libgtk-3-0 \
            libgbm1
          sudo add-apt-repository -y ppa:alexlarsson/flatpak

      - name: Install pnpm
        run: npm install -g pnpm@10.0.0

      - name: Run fast tests
        run: |
          mkdir -p ./reports/out
          yarn test:fast --reporter=default --reporter=junit --outputFile="./reports/out/test_output.xml"

  slow-tests:
    needs: lint-and-build
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-latest]
        arch: [x64, arm64]
        exclude:
          - os: windows-latest
            arch: arm64
          - os: ubuntu-22.04
            arch: arm64
          - os: macos-latest
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Configure git
        run: git config --global core.autocrlf input

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # TODO(Forge 8): remove this once we can upgrade to `@electron/rebuild` v4
      - name: Set up Python 3.11 (with distutils)
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.11

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: yarn install --immutable

      - name: Download build artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: dist-files
          path: packages

      - name: Windows setup
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd "$PROGRAMFILES/nodejs/node_modules/npm/node_modules/@npmcli/run-script"
          npm install node-gyp@9.4.0

      - name: Linux setup
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            --no-install-recommends \
            xvfb \
            libnss3 \
            libasound2 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libgdk-pixbuf2.0-dev \
            libgtk-3-0 \
            libgbm1

      - name: Install pnpm
        run: npm install -g pnpm@10.0.0

      - name: Run slow tests
        run: |
          mkdir -p ./reports/out
          yarn test:slow --reporter=default --reporter=junit --outputFile="./reports/out/test_output.xml"
          yarn test:verdaccio --reporter=default --reporter=junit --outputFile="./reports/out/test_output_verdaccio.xml"

  required-ci:
    needs:
      - lint-and-build
      - fast-tests
      - slow-tests
    runs-on: ubuntu-latest
    steps:
      - name: We are done
        run: echo "Hello World"
